<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Vowel attachment and hiatus study</title>
  <desc id="desc">Five distinct vowel shapes shown in the primary position above a consonant and repeated in a lower position when a second vowel follows in hiatus.</desc>
  <rect width="1600" height="1120" fill="#ffffff"/>
  <style>
    .heading { font: 700 42px system-ui, sans-serif; fill: #17252a; }
    .subheading { font: 400 20px system-ui, sans-serif; fill: #52636a; }
    .section { font: 700 27px system-ui, sans-serif; fill: #17252a; }
    .panel { fill: #f7faf9; stroke: #c9d5d2; stroke-width: 2; }
    .cell { fill: #ffffff; stroke: #d7e0de; stroke-width: 2; }
    .core { fill: none; stroke: #263238; stroke-width: 13; stroke-linecap: round; stroke-linejoin: round; }
    .vowel { fill: none; stroke: #b45309; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    .vowel-fill { fill: #b45309; }
    .guide { fill: none; stroke: #b8c8c5; stroke-width: 2; stroke-dasharray: 7 8; }
    .label { font: 700 26px system-ui, sans-serif; fill: #17252a; text-anchor: middle; }
    .note { font: 400 16px system-ui, sans-serif; fill: #52636a; text-anchor: middle; }
    .anatomy { font: 650 18px system-ui, sans-serif; fill: #0f766e; }
    .roman { font: 700 30px ui-monospace, monospace; fill: #17252a; }
  </style>

  <defs>
    <g id="core-l"><path class="core" d="M85 20 Q42 7 23 44 Q8 76 34 101 Q57 122 86 101 M39 48 Q64 34 82 54"/></g>
    <g id="core-th"><path class="core" d="M16 35 Q53 8 94 34 Q77 58 51 55 Q29 53 16 35 M52 55 Q70 78 55 108"/><path class="core" d="M84 13 Q113 29 88 47"/></g>
    <g id="v-a"><circle class="vowel-fill" cx="0" cy="0" r="10"/></g>
    <g id="v-e"><path class="vowel" d="M-14 0 Q0 -11 14 0 Q0 11 -14 0Z"/></g>
    <g id="v-i"><path class="vowel" d="M0 -15 L0 15"/><circle class="vowel-fill" cx="0" cy="-20" r="4"/></g>
    <g id="v-o"><circle class="vowel" cx="0" cy="0" r="12"/></g>
    <g id="v-u"><path class="vowel" d="M-14 -7 Q0 15 14 -7"/></g>
  </defs>

  <text class="heading" x="54" y="68">Five vowels, two explicit positions</text>
  <text class="subheading" x="54" y="107">Shape identifies the vowel. Position says whether it follows the consonant directly or follows another vowel in hiatus.</text>

  <g transform="translate(40 145)">
    <rect class="panel" width="1520" height="330" rx="6"/>
    <text class="section" x="28" y="44">Primary vowel</text>
    <text class="subheading" x="28" y="76">Every onset cell has exactly one upper companion.</text>
    <g transform="translate(250 92)">
      <g transform="translate(0 0)"><rect class="cell" width="210" height="205" rx="5"/><use href="#core-l" transform="translate(56 20)"/><use href="#v-a" transform="translate(151 45)"/><text class="label" x="105" y="169">a</text><text class="note" x="105" y="192">point</text></g>
      <g transform="translate(235 0)"><rect class="cell" width="210" height="205" rx="5"/><use href="#core-l" transform="translate(56 20)"/><use href="#v-e" transform="translate(151 45)"/><text class="label" x="105" y="169">e</text><text class="note" x="105" y="192">leaf</text></g>
      <g transform="translate(470 0)"><rect class="cell" width="210" height="205" rx="5"/><use href="#core-l" transform="translate(56 20)"/><use href="#v-i" transform="translate(151 49)"/><text class="label" x="105" y="169">i</text><text class="note" x="105" y="192">stem</text></g>
      <g transform="translate(705 0)"><rect class="cell" width="210" height="205" rx="5"/><use href="#core-l" transform="translate(56 20)"/><use href="#v-o" transform="translate(151 45)"/><text class="label" x="105" y="169">o</text><text class="note" x="105" y="192">ring</text></g>
      <g transform="translate(940 0)"><rect class="cell" width="210" height="205" rx="5"/><use href="#core-l" transform="translate(56 20)"/><use href="#v-u" transform="translate(151 45)"/><text class="label" x="105" y="169">u</text><text class="note" x="105" y="192">cup</text></g>
    </g>
  </g>

  <g transform="translate(40 510)">
    <rect class="panel" width="1520" height="300" rx="6"/>
    <text class="section" x="28" y="44">Second vowel in hiatus</text>
    <text class="subheading" x="28" y="76">The same five shapes move below the consonant core. No separate hiatus punctuation is needed.</text>
    <g transform="translate(355 90)">
      <g transform="translate(0 0)"><rect class="cell" width="250" height="180" rx="5"/><use href="#core-l" transform="translate(65 22) scale(.9)"/><use href="#v-e" transform="translate(165 30)"/><use href="#v-a" transform="translate(165 125)"/><text class="label" x="210" y="90">e.a</text></g>
      <g transform="translate(285 0)"><rect class="cell" width="250" height="180" rx="5"/><use href="#core-l" transform="translate(65 22) scale(.9)"/><use href="#v-a" transform="translate(165 30)"/><use href="#v-u" transform="translate(165 125)"/><text class="label" x="210" y="90">a.u</text></g>
      <g transform="translate(570 0)"><rect class="cell" width="250" height="180" rx="5"/><use href="#core-l" transform="translate(65 22) scale(.9)"/><use href="#v-i" transform="translate(165 34)"/><use href="#v-a" transform="translate(165 125)"/><text class="label" x="210" y="90">i.a</text></g>
    </g>
  </g>

  <g transform="translate(40 845)">
    <rect class="panel" width="1520" height="225" rx="6"/>
    <text class="section" x="28" y="44">Word anatomy: lothea</text>
    <text class="subheading" x="28" y="76">Two consonant cores carry three syllables. The lower a makes the final hiatus visible.</text>
    <g transform="translate(580 34)">
      <rect class="guide" x="0" y="48" width="170" height="135" rx="4"/>
      <use href="#core-l" transform="translate(24 62) scale(.85)"/>
      <use href="#v-o" transform="translate(128 75) scale(.85)"/>
      <text class="anatomy" x="85" y="178" text-anchor="middle">lo</text>
      <text class="roman" x="197" y="127">+</text>
      <rect class="guide" x="245" y="48" width="190" height="135" rx="4"/>
      <use href="#core-th" transform="translate(270 62) scale(.85)"/>
      <use href="#v-e" transform="translate(392 75) scale(.85)"/>
      <use href="#v-a" transform="translate(392 158) scale(.85)"/>
      <text class="anatomy" x="340" y="178" text-anchor="middle">the.a</text>
      <text class="roman" x="476" y="127">=</text>
      <text class="roman" x="540" y="127">lothea</text>
    </g>
  </g>

  <text class="subheading" x="54" y="1100">Orange distinguishes vowels for inspection. The eventual hand must remain readable in one color.</text>
</svg>
