name: retry flaky deploy

on:
  workflow_run:
    workflows: ["deploy site"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Re-run the failed deploy (Pages backend flakes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --failed
