site_name: The Phi Language Manual
site_description: A complete, accessible, authoritative guide to Phi
site_author: Daniel Ellison
site_url: https://dcellison.github.io/phi/

repo_name: dcellison/phi
repo_url: https://github.com/dcellison/phi

docs_dir: manual

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - content.code.copy

nav:
  - Home: README.md
  - Outline: OUTLINE.md
  - Part I — First Light:
    - Chapter 1 — Why a New Language:
      - The invisible architecture: part1_first_light/ch01_why_new_language/01_invisible_architecture.md
      - Cracks in the foundation: part1_first_light/ch01_why_new_language/02_cracks_in_foundation.md
      - The language laboratory: part1_first_light/ch01_why_new_language/03_language_laboratory.md
      - What Phi attempts: part1_first_light/ch01_why_new_language/04_what_phi_attempts.md
      - How to use this book: part1_first_light/ch01_why_new_language/05_how_to_use_this_book.md
    - Chapter 2 — Your First Words:
      - What Phi sounds like: part1_first_light/ch02_first_words/01_what_phi_sounds_like.md
      - Your first sentence: part1_first_light/ch02_first_words/02_your_first_sentence.md
      - The music of vowel hiatus: part1_first_light/ch02_first_words/03_the_music_of_vowel_hiatus.md
      - Ten essential words: part1_first_light/ch02_first_words/04_ten_essential_words.md
